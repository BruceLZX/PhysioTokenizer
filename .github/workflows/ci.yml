name: PhysioTokenizer CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check src/ scripts/

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev]"
      - run: python -c "from src.tokenizer.physio_vq import PhysioTokenizer, TokenizerConfig; m = PhysioTokenizer(TokenizerConfig()); print(f'Model created: {sum(p.numel())/1e6:.1f}M params')"
      - run: python -c "from src.eval.benchmark import PhysioBenchmark; print('Benchmark module OK')"
      - run: python -c "from src.viz.plot_results import *; print('Plot module OK')"

  paper-check:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check paper compiles
        uses: xu-cheng/latex-action@v3
        with:
          root_file: paper/physiotokenizer.tex
          working_directory: paper/
          args: "-pdf -interaction=nonstopmode -halt-on-error"
        continue-on-error: true  # Will fail without aaai2027.sty in path; fix in later commit
