# PhysioTokenizer — Full multi-modal config
# For Phase 3+: ECG + EEG + PPG with adaptive boundaries + shared codebook

experiment:
  name: "physiotokenizer_full"
  seed: 42
  mixed_precision: true
  log_every_n_steps: 50
  save_every_n_epochs: 20
  wandb_project: "physiotokenizer"

data:
  modality: "all"
  datasets:
    # ECG
    - name: "ptbxl"
      path: "./data/ptbxl"
      modality: "ecg"
      sampling_rate: 500
      segment_duration_s: 10.0
      n_leads: 12
    # EEG
    - name: "sleep_edf"
      path: "./data/sleep_edf"
      modality: "eeg"
      sampling_rate: 100
      segment_duration_s: 30.0
      n_channels: 2
    # PPG
    - name: "ppg_dalia"
      path: "./data/ppg_dalia"
      modality: "ppg"
      sampling_rate: 32
      segment_duration_s: 30.0
      n_channels: 1
  val_split: 0.1
  test_split: 0.1

tokenizer:
  n_channels: 12
  segment_length: 5000
  freq_bands:
    delta: [0.5, 4]
    theta: [4, 8]
    alpha: [8, 13]
    beta: [13, 30]
    gamma: [30, 50]
  codebook_sizes:
    delta: 512
    theta: 512
    alpha: 512
    beta: 384
    gamma: 256
  codebook_dim: 128
  shared_codebook_size: 512
  n_quantizers: 4
  commitment_cost: 0.25
  use_adaptive_boundaries: true
  boundary_hidden_dim: 256
  min_token_duration: 20

training:
  batch_size: 16  # Smaller due to multi-modal
  epochs: 200
  lr: 3.0e-4
  weight_decay: 1.0e-5
  warmup_steps: 2000
  lr_scheduler: "cosine"
  grad_clip_norm: 1.0
  recon_loss_weight: 1.0
  commit_loss_weight: 0.25
  freq_consistency_weight: 0.1
  entropy_weight: 0.01
  cross_modal_alignment_weight: 0.05

downstream:
  linear_probe_epochs: 50
  probe_lr: 1.0e-3
  probe_layers: 2
  probe_dim: 256
  tasks:
    ecg: ["diagnostic_classification"]
    eeg: ["sleep_staging"]
    ppg: ["heart_rate_estimation"]
